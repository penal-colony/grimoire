<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grimoire</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon-48.png" alt="Lorebook" class="header-icon">
        <h1>Grimoire</h1>
      </div>
      <label class="switch" title="Master toggle: inject lorebook into chats">
        <input type="checkbox" id="masterToggle" checked>
        <span class="slider"></span>
      </label>
    </header>

    <!-- Settings bar -->
    <div class="settings-bar">
      <label class="setting-label" title="How many recent messages to scan for keyword triggers">
        Scan depth:
        <input type="number" id="scanDepthInput" class="input input-sm" value="3" min="1" max="50">
      </label>
    </div>

    <!-- === Lorebook List View === -->
    <div id="view-lorebooks" class="view">
      <div class="toolbar">
        <button id="btnAddLorebook" class="btn btn-primary">+ Add Lorebook</button>
        <button id="btnImportLorebook" class="btn btn-secondary">Import</button>
      </div>

      <div id="lorebookList" class="lorebook-list">
        <!-- Lorebook cards rendered here by JS -->
      </div>

      <div id="lorebookEmptyState" class="empty-state" style="display:none">
        <p>No lorebooks yet.</p>
        <p>Create one or import a SillyTavern lorebook.</p>
      </div>
    </div>

    <!-- === Lorebook Detail View === -->
    <div id="view-detail" class="view" style="display:none">
      <div class="detail-header">
        <button id="btnBack" class="btn btn-secondary btn-back">&larr; Back</button>
        <div class="detail-title">
          <h2 id="detailName">Lorebook</h2>
          <span id="detailCount" class="detail-count">0 entries</span>
        </div>
        <button id="btnEditLorebook" class="btn btn-secondary btn-icon" title="Edit lorebook">&#9998;</button>
      </div>

      <div class="toolbar">
        <button id="btnAddEntry" class="btn btn-primary">+ Add Entry</button>
        <button id="btnExportEntries" class="btn btn-secondary">Export</button>
      </div>

      <div id="entryList" class="entry-list">
        <!-- Entries rendered here by JS -->
      </div>

      <div id="entryEmptyState" class="empty-state" style="display:none">
        <p>No entries in this lorebook.</p>
        <p>Add one or import entries.</p>
      </div>
    </div>

    <!-- Edit entry modal -->
    <div id="editModal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Edit Entry</h2>
          <button id="btnCloseModal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <label class="field-label">Label / Comment</label>
          <input type="text" id="editComment" class="input" placeholder="Entry description">

          <label class="field-label">Keywords (comma-separated)</label>
          <input type="text" id="editKeys" class="input" placeholder="keyword1, keyword2">

          <label class="field-label">Content</label>
          <textarea id="editContent" class="textarea" rows="6" placeholder="Lorebook content to inject..."></textarea>

          <div class="field-row">
            <label class="checkbox-label">
              <input type="checkbox" id="editConstant">
              <span>Constant (always inject)</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="editSelective" checked>
              <span>Selective (keyword-triggered)</span>
            </label>
          </div>

          <label class="field-label">Order (lower = injected first)</label>
          <input type="number" id="editOrder" class="input" value="100" min="0" max="999">
        </div>
        <div class="modal-footer">
          <button id="btnDelete" class="btn btn-danger">Delete</button>
          <button id="btnSave" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Edit lorebook modal -->
    <div id="lorebookModal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h2 id="lorebookModalTitle">Edit Lorebook</h2>
          <button id="btnCloseLorebookModal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <label class="field-label">Name</label>
          <input type="text" id="editLbName" class="input" placeholder="Lorebook name">

          <label class="field-label">Description</label>
          <input type="text" id="editLbDescription" class="input" placeholder="Optional description">
        </div>
        <div class="modal-footer">
          <button id="btnDeleteLorebook" class="btn btn-danger">Delete</button>
          <button id="btnSaveLorebook" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared logic -->
  <script src="../lib/lorebook.js"></script>
  <!-- Side panel logic -->
  <script src="sidepanel.js"></script>
</body>
</html>
